<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 120 120" width="120" height="120" role="img" aria-label="Travis Bradberry monogram">
  <defs>
    <linearGradient id="navy" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#2b3360"/>
      <stop offset="1" stop-color="#161b38"/>
    </linearGradient>
    <linearGradient id="gold" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#e9c46a"/>
      <stop offset="1" stop-color="#c9962f"/>
    </linearGradient>
  </defs>
  <!-- badge -->
  <circle cx="60" cy="60" r="58" fill="url(#navy)"/>
  <!-- thin gold ring -->
  <circle cx="60" cy="60" r="50" fill="none" stroke="url(#gold)" stroke-width="1.6" opacity="0.9"/>
  <!-- monogram TB -->
  <text x="60" y="73" text-anchor="middle"
        font-family="Georgia, 'Times New Roman', serif" font-size="48" font-weight="700"
        letter-spacing="-2" fill="url(#gold)">TB</text>
  <!-- small EQ tagline arc dots -->
  <circle cx="60" cy="98" r="1.7" fill="url(#gold)"/>
  <circle cx="50" cy="97" r="1.2" fill="#e9c46a" opacity="0.7"/>
  <circle cx="70" cy="97" r="1.2" fill="#e9c46a" opacity="0.7"/>
</svg>
