<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <meta name="robots" content="noindex, nofollow" />
  <title>Admin — Subscribers · Dr. Travis Bradberry</title>
  <link rel="icon" type="image/svg+xml" href="assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Fraunces:ital,opsz,wght@0,9..144,500;0,9..144,600&family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --paper: #f7f5ef; --card: #ffffff; --ink: #191b2a; --ink-soft: #4a4d63;
      --ink-faint: #8b8ea6; --line: rgba(25,27,42,0.10); --navy: #232a52;
      --navy-deep: #181d3a; --gold: #c9962f; --teal: #2a7d72; --danger: #b3261e;
      --radius: 14px; --font: 'Inter', system-ui, -apple-system, sans-serif;
      --serif: 'Fraunces', Georgia, serif;
    }
    * { box-sizing: border-box; }
    body { margin: 0; font-family: var(--font); color: var(--ink); background: var(--paper);
      -webkit-font-smoothing: antialiased; }
    a { color: var(--teal); }
    h1, h2 { font-family: var(--serif); font-weight: 600; letter-spacing: -0.01em; margin: 0; }

    /* ---- Login ---- */
    .login-wrap { min-height: 100vh; display: grid; place-items: center; padding: 24px; }
    .login-card { width: 100%; max-width: 380px; background: var(--card); border: 1px solid var(--line);
      border-radius: var(--radius); padding: 32px 28px; box-shadow: 0 30px 60px -28px rgba(24,29,58,0.35); }
    .login-card h1 { font-size: 1.5rem; color: var(--navy-deep); }
    .login-card p.sub { margin: 6px 0 22px; color: var(--ink-faint); font-size: 0.92rem; }
    label { display: block; font-size: 0.82rem; font-weight: 600; color: var(--ink-soft); margin: 14px 0 6px; }
    input[type=email], input[type=password] { width: 100%; padding: 11px 13px; font: inherit;
      border: 1px solid var(--line); border-radius: 10px; background: #fff; color: var(--ink); }
    input:focus { outline: 2px solid var(--gold); border-color: transparent; }
    .btn { display: inline-flex; align-items: center; justify-content: center; gap: 8px; cursor: pointer;
      font: inherit; font-weight: 600; border: 0; border-radius: 10px; padding: 11px 18px; }
    .btn-primary { background: var(--navy); color: #fff; width: 100%; margin-top: 20px; }
    .btn-primary:hover { background: var(--navy-deep); }
    .btn-primary:disabled { opacity: 0.6; cursor: default; }
    .btn-ghost { background: transparent; color: var(--ink-soft); border: 1px solid var(--line); padding: 8px 14px; }
    .btn-ghost:hover { background: var(--paper); }
    .btn-gold { background: var(--gold); color: #fff; }
    .btn-gold:hover { filter: brightness(0.95); }
    .msg { margin-top: 14px; font-size: 0.88rem; min-height: 1.2em; }
    .msg.err { color: var(--danger); }
    .msg.ok { color: var(--teal); }

    /* ---- Dashboard ---- */
    .topbar { background: var(--navy-deep); color: #fff; padding: 16px 24px; display: flex;
      align-items: center; justify-content: space-between; gap: 16px; flex-wrap: wrap; }
    .topbar h1 { color: #fff; font-size: 1.25rem; }
    .topbar .who { font-size: 0.85rem; color: rgba(255,255,255,0.6); }
    .topbar .who b { color: rgba(255,255,255,0.9); font-weight: 600; }
    .topbar .btn-ghost { color: #fff; border-color: rgba(255,255,255,0.25); }
    .topbar .btn-ghost:hover { background: rgba(255,255,255,0.08); }
    .wrap { max-width: 1000px; margin: 0 auto; padding: 28px 24px 60px; }

    .cards { display: grid; grid-template-columns: repeat(4, 1fr); gap: 14px; margin-bottom: 26px; }
    @media (max-width: 680px) { .cards { grid-template-columns: repeat(2, 1fr); } }
    .stat { text-align: left; background: var(--card); border: 1px solid var(--line); border-radius: var(--radius);
      padding: 18px; cursor: pointer; transition: border-color .15s, transform .15s; font: inherit; }
    .stat:hover { transform: translateY(-2px); }
    .stat.active { border-color: var(--gold); box-shadow: 0 0 0 2px rgba(201,150,47,0.25); }
    .stat .label { font-size: 0.78rem; font-weight: 600; color: var(--ink-faint); text-transform: uppercase;
      letter-spacing: 0.05em; }
    .stat .num { font-family: var(--serif); font-size: 2.1rem; color: var(--navy-deep); line-height: 1.1; margin-top: 6px; }

    .toolbar { display: flex; align-items: center; justify-content: space-between; gap: 12px;
      margin-bottom: 14px; flex-wrap: wrap; }
    .toolbar .heading { font-family: var(--serif); font-size: 1.2rem; color: var(--navy-deep); }
    .toolbar .heading small { font-family: var(--font); font-weight: 500; color: var(--ink-faint); font-size: 0.85rem; }

    .table-card { background: var(--card); border: 1px solid var(--line); border-radius: var(--radius); overflow: hidden; }
    table { width: 100%; border-collapse: collapse; }
    th, td { text-align: left; padding: 12px 16px; font-size: 0.9rem; border-bottom: 1px solid var(--line); }
    th { background: var(--paper); font-weight: 600; color: var(--ink-soft); font-size: 0.78rem;
      text-transform: uppercase; letter-spacing: 0.04em; }
    tr:last-child td { border-bottom: 0; }
    td.email { font-weight: 500; }
    td.muted, .muted { color: var(--ink-faint); }
    .empty { padding: 40px 16px; text-align: center; color: var(--ink-faint); }
    [hidden] { display: none !important; }
  </style>
</head>
<body>
  <!-- ===== LOGIN ===== -->
  <div id="login-view" class="login-wrap">
    <form id="login-form" class="login-card" novalidate>
      <h1>Subscribers Admin</h1>
      <p class="sub">Sign in to view newsletter subscribers.</p>
      <label for="email">Email</label>
      <input id="email" type="email" autocomplete="username" required />
      <label for="password">Password</label>
      <input id="password" type="password" autocomplete="current-password" required />
      <button id="login-btn" class="btn btn-primary" type="submit">Sign in</button>
      <p id="login-msg" class="msg" role="status" aria-live="polite"></p>
    </form>
  </div>

  <!-- ===== DASHBOARD ===== -->
  <div id="dash-view" hidden>
    <div class="topbar">
      <h1>Subscribers</h1>
      <div style="display:flex;align-items:center;gap:16px">
        <span class="who">Signed in as <b id="who-email"></b></span>
        <button id="logout-btn" class="btn btn-ghost" type="button">Log out</button>
      </div>
    </div>
    <div class="wrap">
      <div class="cards" id="cards">
        <button class="stat" data-period="week"  type="button"><span class="label">This Week</span><span class="num" id="num-week">–</span></button>
        <button class="stat" data-period="month" type="button"><span class="label">This Month</span><span class="num" id="num-month">–</span></button>
        <button class="stat" data-period="year"  type="button"><span class="label">This Year</span><span class="num" id="num-year">–</span></button>
        <button class="stat" data-period="all"   type="button"><span class="label">All Time</span><span class="num" id="num-all">–</span></button>
      </div>

      <div class="toolbar">
        <div class="heading" id="list-heading">This Week <small id="list-count"></small></div>
        <button id="csv-btn" class="btn btn-gold" type="button">⬇ Download CSV</button>
      </div>

      <div class="table-card">
        <table>
          <thead><tr><th>Email</th><th>Subscribed</th><th>Source</th></tr></thead>
          <tbody id="rows"></tbody>
        </table>
        <div id="empty" class="empty" hidden>No subscribers in this period yet.</div>
      </div>
      <p id="dash-msg" class="msg" role="status" aria-live="polite"></p>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="admin.js"></script>
</body>
</html>
